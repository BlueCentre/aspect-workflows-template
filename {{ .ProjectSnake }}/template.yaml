apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
{{- if .Computed.kitchen_sink }}
  name: aspect-workflows-kitchen-sink
  title: Aspect Workflows - Kitchen Sink (All Languages)
  description: Multi-language Bazel monorepo with all supported languages and features
{{- else if .Computed.minimal }}
  name: aspect-workflows-minimal
  title: Aspect Workflows - Minimal
  description: Minimal Bazel monorepo setup with no language-specific features
{{- else if .Computed.javascript }}
  name: aspect-workflows-javascript
  title: Aspect Workflows - JavaScript/TypeScript
  description: Bazel monorepo for JavaScript and TypeScript projects
{{- else if .Computed.python }}
  name: aspect-workflows-python
  title: Aspect Workflows - Python
  description: Bazel monorepo for Python projects
{{- else if .Computed.go }}
  name: aspect-workflows-go
  title: Aspect Workflows - Go
  description: Bazel monorepo for Go projects
{{- else if .Computed.java }}
  name: aspect-workflows-java
  title: Aspect Workflows - Java
  description: Bazel monorepo for Java projects
{{- else if .Computed.kotlin }}
  name: aspect-workflows-kotlin
  title: Aspect Workflows - Kotlin
  description: Bazel monorepo for Kotlin projects
{{- else if .Computed.cpp }}
  name: aspect-workflows-cpp
  title: Aspect Workflows - C/C++
  description: Bazel monorepo for C and C++ projects
{{- else if .Computed.rust }}
  name: aspect-workflows-rust
  title: Aspect Workflows - Rust
  description: Bazel monorepo for Rust projects
{{- else if .Computed.shell }}
  name: aspect-workflows-shell
  title: Aspect Workflows - Shell
  description: Bazel monorepo for Shell script projects
{{- else }}
  name: aspect-workflows-custom
  title: Aspect Workflows - Custom
  description: Customizable Bazel monorepo template
{{- end }}
  tags:
    - bazel
    - aspect-workflows
    - monorepo
{{- if .Computed.kitchen_sink }}
    - multi-language
{{- end }}
{{- if .Computed.javascript }}
    - javascript
    - typescript
{{- end }}
{{- if .Computed.python }}
    - python
{{- end }}
{{- if .Computed.go }}
    - go
{{- end }}
{{- if .Computed.java }}
    - java
{{- end }}
{{- if .Computed.kotlin }}
    - kotlin
{{- end }}
{{- if .Computed.cpp }}
    - cpp
{{- end }}
{{- if .Computed.rust }}
    - rust
{{- end }}
{{- if .Computed.shell }}
    - shell
{{- end }}
  links:
    - url: https://github.com/aspect-build/aspect-cli
      title: Aspect CLI
      icon: github
    - url: https://docs.aspect.build/
      title: Documentation
      icon: docs

spec:
  owner: team-platform
  type: service
  
  parameters:
    - title: Project Information
      required:
        - name
        - owner
      properties:
        name:
          title: Project Name
          type: string
          description: Unique name for your project (will be used for repository name)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
          ui:options:
            rows: 1
        description:
          title: Description
          type: string
          description: A brief description of your project
          ui:options:
            rows: 3
        owner:
          title: Owner
          type: string
          description: Team or user who owns this project
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

    - title: Repository Configuration
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
{{- if not .Computed.minimal }}
            allowedOwners:
              - {{ "${{" }} parameters.owner {{ "}}" }}
{{- end }}

{{- if not .Computed.kitchen_sink }}
{{- if not .Computed.minimal }}
    - title: Language Selection
      properties:
        languages:
          title: Languages
          type: array
          description: Select the programming languages you want to use
          items:
            type: string
            enum:
{{- if not .Computed.javascript }}
              - JavaScript & TypeScript
{{- end }}
{{- if not .Computed.python }}
              - Python
{{- end }}
{{- if not .Computed.go }}
              - Go
{{- end }}
{{- if not .Computed.java }}
              - Java
{{- end }}
{{- if not .Computed.kotlin }}
              - Kotlin
{{- end }}
{{- if not .Computed.cpp }}
              - C & C++
{{- end }}
{{- if not .Computed.rust }}
              - Rust
{{- end }}
{{- if not .Computed.shell }}
              - Shell (Bash)
{{- end }}
          uniqueItems: true
          ui:widget: checkboxes
{{- end }}
{{- end }}

{{- if not .Computed.minimal }}
    - title: Features
      properties:
{{- if not .Scaffold.lint }}
        enableLinting:
          title: Enable Formatting and Linting
          type: boolean
          description: Setup format and linting using rules_lint
          default: true
{{- end }}
{{- if not .Scaffold.stamp }}
        enableStamping:
          title: Enable Version Stamping
          type: boolean
          description: Setup version stamping for releases
          default: false
{{- end }}
{{- if not .Scaffold.oci }}
        enableOCI:
          title: Enable OCI Containers
          type: boolean
          description: Setup OCI container builds with rules_oci
          default: false
{{- end }}
        enableCodegen:
          title: Enable Code Generation Tools
          type: boolean
          description: Install copier (Python), yeoman (JS), and scaffold (Go)
          default: false
{{- end }}

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: {{ "${{" }} parameters.name {{ "}}" }}
          description: {{ "${{" }} parameters.description {{ "}}" }}
          owner: {{ "${{" }} parameters.owner {{ "}}" }}
          destination: {{ "${{" }} parameters.repoUrl | parseRepoUrl {{ "}}" }}
{{- if not .Computed.kitchen_sink }}
{{- if not .Computed.minimal }}
          languages: {{ "${{" }} parameters.languages {{ "}}" }}
{{- end }}
{{- end }}
{{- if not .Computed.minimal }}
{{- if not .Scaffold.lint }}
          enableLinting: {{ "${{" }} parameters.enableLinting {{ "}}" }}
{{- end }}
{{- if not .Scaffold.stamp }}
          enableStamping: {{ "${{" }} parameters.enableStamping {{ "}}" }}
{{- end }}
{{- if not .Scaffold.oci }}
          enableOCI: {{ "${{" }} parameters.enableOCI {{ "}}" }}
{{- end }}
          enableCodegen: {{ "${{" }} parameters.enableCodegen {{ "}}" }}
{{- end }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: {{ "${{" }} parameters.repoUrl {{ "}}" }}
        description: {{ "${{" }} parameters.description {{ "}}" }}
        defaultBranch: main
        repoVisibility: public
        deleteBranchOnMerge: true
        gitCommitMessage: "Initial commit from Aspect Workflows template"

    - id: register
      name: Register Component
      action: catalog:register
      input:
        repoContentsUrl: {{ "${{" }} steps.publish.output.repoContentsUrl {{ "}}" }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: {{ "${{" }} steps.publish.output.remoteUrl {{ "}}" }}
      - title: Open in Backstage
        icon: catalog
        entityRef: {{ "${{" }} steps.register.output.entityRef {{ "}}" }}
    text:
      - title: Next Steps
        content: |
          # Welcome to your new Aspect Workflows project! 🎉

          Your repository has been created at: {{ "${{" }} steps.publish.output.remoteUrl {{ "}}" }}

          ## Getting Started

          1. Clone the repository:
             ```bash
             git clone {{ "${{" }} steps.publish.output.remoteUrl {{ "}}" }}
             cd {{ "${{" }} parameters.name {{ "}}" }}
             ```

          2. Read the developer guide in `/README.bazel.md`

          3. Setup your dev environment:
             ```bash
             bazel run //tools:bazel_env
             ```
             Note: This requires installing direnv: https://direnv.net/

          4. Try out some commands:
{{- if .Scaffold.lint }}
             - Format: `format`
             - Lint: `aspect lint //...`
{{- else }}
             - Format: `format` (if enabled)
             - Lint: `aspect lint //...` (if enabled)
{{- end }}
             - Run tests: `aspect test //...`
             - Watch mode: `ibazel run //my:devserver`

          5. Add source code and run `bazel run gazelle` to generate BUILD files

          ## Resources

          - 🌟 Star Aspect CLI: https://github.com/aspect-build/aspect-cli
          - 📚 Documentation: https://docs.aspect.build/
          - 💬 Join Bazel Slack: https://slack.bazel.build (#aspect-build channel)
